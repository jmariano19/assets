<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verizon Prototype</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
      background: #F7F1E7;
      color: #1a1a1a; padding: 40px 20px; overflow-x: auto;
    }
    /* Mode toggle */
    .mode-toggle {
      position: fixed; top: 16px; right: 16px;
      display: flex; gap: 4px;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
      border-radius: 999px; padding: 5px 6px; z-index: 999;
    }
    .mode-btn {
      border: none; background: transparent; color: rgba(255,255,255,0.5);
      border-radius: 999px; padding: 5px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, color 0.15s;
      display: flex; align-items: center; gap: 5px; font-family: inherit;
    }
    .mode-btn.active { background: rgba(255,255,255,0.2); color: #fff; }
    .mode-btn svg { width: 13px; height: 13px; fill: currentColor; }

    /* ── Phone frame — simple rounded outline ── */
    .phone-shell {
      border: 10px solid #1a1a1a;
      border-radius: 56px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0,0,0,0.18);
      background: #fff;
    }
    .phone-shell iframe {
      width: 402px; height: 874px;
      border: none; display: block; background: #fff;
    }

    /* ── Tablet frame — simple rounded outline ── */
    .tablet-shell {
      position: relative;
      border: 10px solid #1a1a1a;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0,0,0,0.18);
      background: #fff;
      width: 1100px;
      height: 780px;
    }
    .tablet-shell iframe {
      width: 1100px; height: 780px;
      border: none; display: block; background: #fff;
    }

    /* Hidden until JS sets mode */
    .phone-shell, .tablet-shell { display: none; }

    /* Fullscreen on tiny mobile */
    @media (max-width: 480px) {
      body { padding: 0; background: #fff; }
      .mode-toggle { display: none; }
      .phone-shell { display: block !important; border: none; border-radius: 0; box-shadow: none; }
      .phone-shell iframe { width: 100vw; height: 100vh; }
      .tablet-shell { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="mode-toggle">
    <button class="mode-btn" id="btn-phone" onclick="setMode('phone')">
      <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="3"/><circle cx="12" cy="18" r="1"/></svg>Phone
    </button>
    <button class="mode-btn" id="btn-tablet" onclick="setMode('tablet')">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><circle cx="19" cy="12" r="1"/></svg>Tablet
    </button>
  </div>
  <div class="stage">
    <div class="phone-shell" id="phone-shell">
      <iframe id="frame-phone" title="Verizon Prototype — Phone"></iframe>
    </div>
    <div class="tablet-shell" id="tablet-shell">

      <div id="expand-overlay" style="display:none;position:absolute;pointer-events:none;z-index:100;background:#f0f0f0;opacity:1;"></div>
    </div>
  </div>

    const labels = {"account_overview_mock":"Account","bill_insights":"Bill Insights","explore_savings":"Explore Savings","loading":"Loading","applied_savings":"Applied Savings","checkout_review":"Review","checkout_payment":"Payment","checkout_confirm":"Confirmation","tablet_bill_overview":"Tablet Bill Overview","tablet_applied_savings":"Savings Applied"};
    const order = ["account_overview_mock","bill_insights","tablet_bill_overview","explore_savings","loading","applied_savings","checkout_review","checkout_payment","checkout_confirm"];
    const state = {
      current: location.hash.slice(1) && screens[location.hash.slice(1)] ? location.hash.slice(1) : 'account_overview_mock',
      storage: {
        appliedSavings: '[]',
        savingsParams: ''
      }
    };

    window.__prototypeStorage = {
      getItem(key) {
        return Object.prototype.hasOwnProperty.call(state.storage, key) ? state.storage[key] : null;
      },
      setItem(key, value) {
        state.storage[key] = String(value);
      }
    };

    // frame is set by setMode()
    let frame;
    const utf8Decoder = new TextDecoder();

    // Always injected — strips the inner .phone shell so outer frame is the only frame
    const BASE_CSS = [
      '<style id="base-ov">',
      'body{background:#fff!important;display:flex!important;align-items:flex-start!important;justify-content:flex-start!important;padding:0!important;}',
      '.phone{width:100%!important;height:100vh!important;border-radius:0!important;border:none!important;box-shadow:none!important;}',
      '</style>'
    ].join('');

    // Extra CSS added only in tablet mode
    const TABLET_CSS = [
      '<style id="t-ov">',
      '.status-bar{padding:16px 52px 8px!important;}',
      '.app-header{padding:8px 52px 14px!important;}',
      '.scroll-body{padding:0 52px 52px!important;}',
      '.bottom-bar{padding:16px 52px 32px!important;}',
      '.phone-fullcard-track{flex-wrap:wrap!important;overflow-x:visible!important;gap:16px!important;}',
      '.phone-full-card{width:calc(50% - 8px)!important;min-width:0!important;}',
      '.card{padding:24px!important;}',
      '</style>'
    ].join('');

    function decodeScreen(encoded) {
      const binary = atob(encoded);
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      let html = utf8Decoder.decode(bytes);
      // Always strip the inner phone shell
      html = html.replace('</head>', BASE_CSS + '</head>');
      // Add tablet layout overrides on top
      if (state.isTablet) {
        html = html.replace('</head>', TABLET_CSS + '</head>');
      }
      return html;
    }

    const tabletOverrides = {
      'account_overview_mock': 'tablet_account_overview',
      'bill_insights': 'tablet_customer_detail',
      'explore_savings': 'tablet_explore_savings'
    };

    function render() {
      const key = state.isTablet && tabletOverrides[state.current]
        ? tabletOverrides[state.current]
        : state.current;
      frame.srcdoc = decodeScreen(screens[key]);
      location.hash = state.current;
    }

    window.navigateTo = function navigateTo(screen) {
      if (!screens[screen]) return;
      state.current = screen;
      render();
    };

    window.navigateExpand = function navigateExpand(screen, cardRect) {
      if (!screens[screen]) return;
      const shell = document.getElementById('tablet-shell');
      const overlay = document.getElementById('expand-overlay');
      if (!overlay || !state.isTablet) { window.navigateTo(screen); return; }

      // Start at card position (iframe coords == shell content coords)
      overlay.style.cssText = [
        'display:block', 'position:absolute',
        'left:' + cardRect.left + 'px', 'top:' + cardRect.top + 'px',
        'width:' + cardRect.width + 'px', 'height:' + cardRect.height + 'px',
        'background:#f0f0f0', 'border-radius:16px',
        'pointer-events:none', 'z-index:100', 'opacity:1', 'transition:none'
      ].join(';');

      void overlay.offsetWidth; // force reflow

      // Animate to full frame
      overlay.style.transition = 'left 0.4s cubic-bezier(0.4,0,0.2,1), top 0.4s cubic-bezier(0.4,0,0.2,1), width 0.4s cubic-bezier(0.4,0,0.2,1), height 0.4s cubic-bezier(0.4,0,0.2,1), border-radius 0.4s cubic-bezier(0.4,0,0.2,1)';
      overlay.style.left = '0';
      overlay.style.top = '0';
      overlay.style.width = shell.clientWidth + 'px';
      overlay.style.height = shell.clientHeight + 'px';
      overlay.style.borderRadius = '0';

      setTimeout(function() {
        state.current = screen;
        render();
        // Fade out to reveal new screen
        overlay.style.transition = 'opacity 0.25s ease';
        overlay.style.opacity = '0';
        setTimeout(function() {
          overlay.style.display = 'none';
          overlay.style.opacity = '1';
        }, 260);
      }, 420);
    };

    // ── Mode switching ──────────────────────────────────────────────────────
    function setMode(mode) {
      state.isTablet = (mode === 'tablet');
      document.getElementById('phone-shell').style.display  = state.isTablet ? 'none'  : 'block';
      document.getElementById('tablet-shell').style.display = state.isTablet ? 'flex' : 'none';
      document.getElementById('btn-phone').classList.toggle('active',  !state.isTablet);
      document.getElementById('btn-tablet').classList.toggle('active',  state.isTablet);
      frame = document.getElementById(state.isTablet ? 'frame-tablet' : 'frame-phone');
      render();
    }

    // Auto-detect mode on load
    state.isTablet = window.innerWidth >= 900;
    setMode(state.isTablet ? 'tablet' : 'phone');
  </script>
