    const order = ["account_overview_mock","bill_insights","explore_savings","loading","applied_savings","checkout_review","checkout_payment","checkout_confirm"];
    const state = {
      current: location.hash.slice(1) && screens[location.hash.slice(1)] ? location.hash.slice(1) : 'account_overview_mock',
      storage: {
        appliedSavings: '[]',
        savingsParams: ''
      }
    };

    window.__prototypeStorage = {
      getItem(key) {
        return Object.prototype.hasOwnProperty.call(state.storage, key) ? state.storage[key] : null;
      },
      setItem(key, value) {
        state.storage[key] = String(value);
      }
    };

    const frame = document.getElementById('prototype-frame');
    const utf8Decoder = new TextDecoder();

    function decodeScreen(encoded) {
      const binary = atob(encoded);
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return utf8Decoder.decode(bytes);
    }

    function render() {
      frame.srcdoc = decodeScreen(screens[state.current]);
      location.hash = state.current;
    }

    window.navigateTo = function navigateTo(screen) {
      if (!screens[screen]) return;
      state.current = screen;
      render();
    };

    render();
  </script>
